<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="portfolio_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>SM Sajan</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Loader -->
  <div id="loader">
    <div class="loader">
      <div class="duo duo1">
        <div class="dot dot-a"></div>
        <div class="dot dot-b"></div>
      </div>
      <div class="duo duo2">
        <div class="dot dot-a"></div>
        <div class="dot dot-b"></div>
      </div>
    </div>
  </div>

  <!-- Flutter Script -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Script to Handle Loader -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loader = document.getElementById("loader");

      if (!loader) {
        console.error("Loader element not found in DOM.");
        return;
      }

      // Listen for the flutter-first-frame event
      window.addEventListener("flutter-first-frame", () => {
        loader.style.display = "none"; // Hide the loader
      });

      setTimeout(() => {
        if (loader.style.display !== "none") {
          console.warn("flutter-first-frame not triggered, hiding loader after fallback timeout.");
          loader.style.display = "none";
        }
      }, 10000); // Fallback after 10 seconds
    });
  </script>

</body>

</html>
